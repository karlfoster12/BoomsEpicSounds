plugins {
    id 'java'
}

repositories {
    mavenCentral()
    maven { url 'https://repo.runelite.net' }
}

dependencies {
    compileOnly 'net.runelite:client:latest.release'
}

group = project.property('group')
version = project.property('version')

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(11)
    }
}